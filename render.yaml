services:
  - type: web
    name: nilechat
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: "cd client && npm install && npm run build && cd ../server && npm install"
    startCommand: "cd server && npm start"
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: DASHBOARD_ORIGIN
        sync: false
      - key: APP_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SETUP_SECRET
        generateValue: true
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: DB_TABLE_NAME
        value: NileChat_byA
      - key: DB_SERVER
        sync: false
      - key: DB_PORT
        value: 1433
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
